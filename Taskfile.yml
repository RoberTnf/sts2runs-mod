version: '3'

tasks:
  bump:major:
    desc: Bump the major version (X.0.0)
    cmds:
      - |
        python3 -c '
        import json, pathlib
        p = pathlib.Path("mod_manifest.json")
        d = json.loads(p.read_text())
        parts = list(map(int, d["version"].split(".")))
        d["version"] = f"{parts[0]+1}.0.0"
        p.write_text(json.dumps(d, indent=2) + "\n")
        v = d["version"]
        print(f"Bumped to {v}")
        '

  bump:minor:
    desc: Bump the minor version (0.X.0)
    cmds:
      - |
        python3 -c '
        import json, pathlib
        p = pathlib.Path("mod_manifest.json")
        d = json.loads(p.read_text())
        parts = list(map(int, d["version"].split(".")))
        d["version"] = f"{parts[0]}.{parts[1]+1}.0"
        p.write_text(json.dumps(d, indent=2) + "\n")
        v = d["version"]
        print(f"Bumped to {v}")
        '

  bump:patch:
    desc: Bump the patch version (0.0.X)
    cmds:
      - |
        python3 -c '
        import json, pathlib
        p = pathlib.Path("mod_manifest.json")
        d = json.loads(p.read_text())
        parts = list(map(int, d["version"].split(".")))
        d["version"] = f"{parts[0]}.{parts[1]}.{parts[2]+1}"
        p.write_text(json.dumps(d, indent=2) + "\n")
        v = d["version"]
        print(f"Bumped to {v}")
        '

  build-release:
    desc: Build the mod and create a shareable release zip in dist/
    cmds:
      - nix develop --command dotnet build -c Release
      - |
        VERSION="$(python3 -c 'import json; print(json.load(open("mod_manifest.json", encoding="utf-8"))["version"])')"
        RELEASE_DIR="dist/STS2RunsMod"
        ZIP_PATH="dist/STS2RunsMod-v${VERSION}.zip"

        rm -rf "$RELEASE_DIR"
        mkdir -p "$RELEASE_DIR"

        cp mod_manifest.json "$RELEASE_DIR/"
        cp installation_instructions.txt "$RELEASE_DIR/"
        cp .godot/mono/temp/bin/Release/STS2RunsMod.dll "$RELEASE_DIR/"

        rm -f "$ZIP_PATH"
        (
          cd dist
          zip -r "STS2RunsMod-v${VERSION}.zip" STS2RunsMod
        )

        printf "Created %s\n" "$ZIP_PATH"

